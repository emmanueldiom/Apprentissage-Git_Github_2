<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP - Envoi par Email</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      form {
        max-width: 400px;
        margin: auto;
      }
      input,
      button {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 10px;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <h1>Envoyer un Code OTP par Email</h1>
    <form id="otpForm">
      <label for="email">Adresse Email:</label>
      <input type="email" id="email" required />
      <button type="submit">Envoyer OTP</button>
    </form>
    <p id="message"></p>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init("YOUR_PUBLIC_KEY"); // Remplacez par votre clé publique EmailJS
      })();

      document
        .getElementById("otpForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const otp = Math.floor(100000 + Math.random() * 900000); // Génère un OTP à 6 chiffres

          const templateParams = {
            to_email: email,
            otp_code: otp,
          };

          emailjs
            .send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams)
            .then(
              function (response) {
                document.getElementById("message").textContent =
                  "OTP envoyé avec succès!";
              },
              function (error) {
                document.getElementById("message").textContent =
                  "Erreur lors de l'envoi: " + error.text;
              },
            );
        });
    </script>
  </body>
</html>
